name: Discord Notify

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commit info to Discord
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"📦 Repo: ${{ github.repository }}\n🌿 Branch: ${{ github.ref_name }}\n💬 Commit: ${{ github.event.head_commit.message }}\n👤 Author: ${{ github.actor }}\"}"
